##############################################################################
# Basic                                                                      #
##############################################################################
# Configure base url, e.g. http://domain:port, without '/'. Temporary disabled to use default.
#MCR.baseurl=
# Requires MCR.baseurl, therefore temporary disabled.
#MIR.CanonicalBaseURL=%MCR.baseurl%/
MCR.NameOfProject=wias
MIR.projectid.default=wias
MIR.testEnvironment=false
MCR.Metadata.Languages=de,en

##############################################################################
# Email                                                                      #
##############################################################################
MCR.Mail.Server=
# General sender mail address, e.g. mail@domain
MCR.Mail.Sender=

# Mail for events including self registration, e.g. <name> mail@domain
MCR.mir-module.EditorMail=
# Sender email for events, e.g. <name> mail@domain
MCR.mir-module.MailSender=

##############################################################################
# Access Control                                                             #
##############################################################################
# Access keys are not relevant and must therefore be deactivated as follows.
MCR.ACL.AccessKey.Strategy.AllowedObjectTypes=
MIR.Access.Strategy.Classifications=mir_access,state
MCR.Access.Strategy.Class=de.vzg.reposis.wias.WiasStrategy

##############################################################################
# Editor                                                                     #
##############################################################################
MIR.EditorForms.CustomIncludes=%MIR.EditorForms.CustomIncludes%,xslStyle:editor/mir2xeditor:webapp:editor/editor-customization.xed
#MIR.Editor.Default.State=new
#MIR.Editor.repeat.max.subject.simple=40
#MIR.Editor.repeat.max.subject.simple.required=40

##############################################################################
# Frontend                                                                   #
##############################################################################
MIR.CustomLayout.JS=wias.js


MCR.user2.RoleCategories=%MCR.user2.RoleCategories%,wias_research_group

# Maximum number of publications that can be outputted within toc
MIR.TableOfContents.MaxResults=10000

MIR.Workflow.Menu=true
MIR.Workflow.Box=true

# disable classification sorting
MCR.URIResolver.Classification.Sort.wias_research_group=false

##############################################################################
# DOI                                                                        #
##############################################################################
  MCR.PI.MetadataService.MODSDOI.Prefix=10.20347
  MCR.DOI.HostingInstitution=Weierstrass Institute
  MCR.PI.MetadataService.MODSDOI.Type=doi

  #MCR.PI.Service.Datacite=org.mycore.pi.doi.MCRDOIService
  MCR.PI.Service.Datacite.Generator=DOIGenerator
  MCR.PI.Service.Datacite.MetadataService=MODSDOI
  MCR.PI.Service.Datacite.Username=
  MCR.PI.Service.Datacite.Password=
  MCR.PI.Service.Datacite.Transformer=datacite
  MCR.PI.Service.Datacite.RegistrationPredicate=org.mycore.pi.condition.MCRPIPublishedPredicate
  MCR.PI.Service.Datacite.RegisterBaseURL=https://archive.wias-berlin.de/

  MCR.PI.Generator.DOIGenerator=de.vzg.reposis.wias.WiasDOIGenerator
  MCR.PI.Generator.DOIGenerator.Prefix=10.20347
  MCR.PI.Generator.DOIGenerator.PreprintSeriesId=wias_mods_00000012
  MCR.PI.Generator.DOIGenerator.AnnualReportSeriesId=wias_mods_00000034

##############################################################################
# PostProcessor                                                              #
##############################################################################
WIAS.PostProcessor.PreprintSeriesId=wias_mods_00000012
WIAS.Strategy.DOIServiceId=Datacite

##############################################################################
# Event Handler                                                              #
##############################################################################
MCR.EventHandler.MCRObject.100.Class=de.vzg.reposis.wias.WiasPreprintNumberEventHandler

##############################################################################
# JPA                                                                        #
##############################################################################
MCR.JPA.MappingFileNames=%MCR.JPA.MappingFileNames%,META-INF/wias-mappings.xml
MCR.Hibernate.Mappings=%MCR.Hibernate.Mappings%,de.vzg.reposis.wias.WiasPreprintNumberEntity


